<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dhokkar Rent a Car</title>
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://picsum.photos/seed/dhokkar/32/32" />
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('fetch override blocked'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not redefine fetch', e);
        }
        
        window.addEventListener('error', function(event) {
          if (event.message && (
            event.message.includes('Cannot set property fetch') || 
            event.message.includes('fetch of #<Window>') ||
            event.message.includes('WebSocket closed without opened') ||
            event.message.includes('failed to connect to websocket')
          )) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && (
            String(event.reason).includes('WebSocket closed without opened') ||
            String(event.reason).includes('failed to connect to websocket')
          )) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
